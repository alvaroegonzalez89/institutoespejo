let nextId = 31;

// Helper: generar slots disponibles para un profesional en una fecha
function generarSlots(profesionalId, fecha) {
  const prof = PROFESIONALES.find(p => p.id === profesionalId);
  if (!prof) return [];
  const d = new Date(fecha + 'T00:00:00');
  const dow = d.getDay(); // 0=dom,1=lun,...,6=sĂˇb
  if (!prof.dias.includes(dow)) return [];

  const slots = [];
  let h = prof.horaInicio;
  let m = 0;
  while (h < prof.horaFin) {
    const hStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    const ocupado = TURNOS.some(t =>
      t.profesionalId === profesionalId &&
      t.fecha === fecha &&
      t.hora === hStr &&
      t.estado !== 'cancelado'
    );
    slots.push({ hora: hStr, disponible: !ocupado });
    m += prof.duracionTurno;
    if (m >= 60) { h += Math.floor(m/60); m = m % 60; }
  }
  return slots;
}

function agregarTurno(turno) {
  turno.id = 't' + nextId++;
  TURNOS.push(turno);
  return turno;
}

function actualizarEstado(id, estado) {
  const t = TURNOS.find(x => x.id === id);
  if (t) t.estado = estado;
}

// Exportar globalmente

  </div>

</main>

<script>
const { PROFESIONALES, TURNOS, generarSlots } = window.IE;
const DIAS_NOMBRES = ['Dom','Lun','Mar','MiĂ©','Jue','Vie','SĂˇb'];
const DIAS_LARGO = ['Domingo','Lunes','Martes','MiĂ©rcoles','Jueves','Viernes','SĂˇbado'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const FECHA_HOY = '2025-06-16';

let profActual = PROFESIONALES[0];
let offsetSemana = 0;
let diaActivo = FECHA_HOY;

function fechaStr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function getLunes(off=0){ const b=new Date('2025-06-16T00:00:00'); b.setDate(b.getDate()+off*7); return b; }

function seleccionarDoctor(id){
  profActual = PROFESIONALES.find(p=>p.id===id);
  document.documentElement.style.setProperty('--color', profActual.color);
  document.documentElement.style.setProperty('--color-light', profActual.colorLight);
  document.getElementById('hdrEl').style.background = profActual.color;
  document.getElementById('docAvatar').textContent = profActual.iniciales;
  document.getElementById('docAvatar').style.background = profActual.color;
  document.getElementById('docNombre').textContent = profActual.nombre;
  document.getElementById('docEsp').textContent = profActual.especialidad;
  const diasNom = profActual.dias.map(d=>DIAS_NOMBRES[d]).join(' 
· ');
  document.getElementById('docDias').textContent = `${diasNom} 
· ${profActual.horaInicio}:00â€“${profActual.horaFin}:00 
· turnos cada ${profActual.duracionTurno} min`;
  document.querySelectorAll('.doc-pill').forEach(b=>{
    b.classList.toggle('active', b.dataset.id===id);
    if(b.dataset.id===id) b.style.background=profActual.color;
    else b.style.background='';
  });
  renderStats(); renderDayTabs(); renderTurnos(); renderSlots(); renderProxSemana();
}

function initPills(){
  const el = document.getElementById('docPills');
  el.innerHTML = PROFESIONALES.map(p=>`
    <button class="doc-pill" data-id="${p.id}" onclick="seleccionarDoctor('${p.id}')" style="color:${p.color}">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:5px;vertical-align:middle"></span>
      ${p.nombre.split(' ').pop()}
    </button>
  `).join('');
}

function renderStats(){
  const mis = TURNOS.filter(t=>t.profesionalId===profActual.id&&t.fecha===FECHA_HOY);
  const conf = mis.filter(t=>t.estado==='confirmado').length;
  const pend = mis.filter(t=>t.estado==='pendiente').length;
  const lunes = getLunes(0);
  let semTot=0;
  for(let i=0;i<6;i++){const d=new Date(lunes);d.setDate(lunes.getDate()+i);semTot+=TURNOS.filter(t=>t.profesionalId===profActual.id&&t.fecha===fechaStr(d)&&t.estado!=='cancelado').length;}
  document.getElementById('statsEl').innerHTML=`
    <div class="stat"><div class="stat-ico" style="background:${profActual.colorLight}"><svg viewBox="0 0 20 20" fill="none" stroke="${profActual.color}" stroke-width="1.8"><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M3 8h14"/></svg></div><div class="stat-lbl">Hoy</div><div class="stat-val" style="color:${profActual.color}">${mis.length}</div><div class="stat-sub">turnos</div></div>
    <div class="stat"><div class="stat-ico" style="background:var(--verde-pal)"><svg viewBox="0 0 20 20" fill="none" stroke="#0F6E56" stroke-width="1.8"><path d="M4 10l4 4 8-8"/></svg></div><div class="stat-lbl">Confirmados</div><div class="stat-val" style="color:var(--verde)">${conf}</div><div class="stat-sub">hoy</div></div>
    <div class="stat"><div class="stat-ico" style="background:var(--ambar-pal)"><svg viewBox="0 0 20 20" fill="none" stroke="#854F0B" stroke-width="1.8"><circle cx="10" cy="10" r="7"/><path d="M10 6v4l2.5 2"/></svg></div><div class="stat-lbl">Pendientes</div><div class="stat-val" style="color:var(--ambar)">${pend}</div><div class="stat-sub">confirmar</div></div>
    <div class="stat"><div class="stat-ico" style="background:${profActual.colorLight}"><svg viewBox="0 0 20 20" fill="none" stroke="${profActual.color}" stroke-width="1.8"><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M7 12h6M7 9h6"/></svg></div><div class="stat-lbl">Esta semana</div><div class="stat-val" style="color:${profActual.color}">${semTot}</div><div class="stat-sub">turnos</div></div>
  `;
}

function renderDayTabs(){
  const lunes = getLunes(offsetSemana);
  const sab = new Date(lunes); sab.setDate(lunes.getDate()+5);
  document.getElementById('weekLbl').textContent = `${lunes.getDate()} â€“ ${sab.getDate()} de ${MESES[lunes.getMonth()]}`;
  const el = document.getElementById('dayTabs');
  el.innerHTML='';
  for(let i=0;i<6;i++){
    const d=new Date(lunes); d.setDate(lunes.getDate()+i);
    const fStr=fechaStr(d);
    const trabaja=profActual.dias.includes(d.getDay());
    const cnt=trabaja?TURNOS.filter(t=>t.profesionalId===profActual.id&&t.fecha===fStr&&t.estado!=='cancelado').length:0;
    const esActivo=fStr===diaActivo;
    el.innerHTML+=`<button class="day-tab${esActivo?' active':''}${!trabaja?' no-trabaja':''}" onclick="${trabaja?`selDia('${fStr}')`:''}" >
      <span class="dtab-dia">${DIAS_NOMBRES[d.getDay()]}</span>
      <span class="dtab-num">${d.getDate()}</span>
      ${cnt&&!esActivo?`<span class="dtab-cnt">${cnt}</span>`:''}
    </button>`;
  }
  document.getElementById('agendaDiaTitle').textContent = `${DIAS_LARGO[new Date(diaActivo+'T00:00:00').getDay()]} ${labelFecha(diaActivo)}`;
}

function labelFecha(str){ const d=new Date(str+'T00:00:00'); return `${d.getDate()} de ${MESES[d.getMonth()]}`; }

function selDia(fStr){
  diaActivo=fStr;
  renderDayTabs();
  renderTurnos();
  renderSlots();
}

function renderTurnos(){
  const ts=TURNOS.filter(t=>t.profesionalId===profActual.id&&t.fecha===diaActivo).sort((a,b)=>a.hora.localeCompare(b.hora));
  const el=document.getElementById('turnosLista');
  if(!ts.length){
    const d=new Date(diaActivo+'T00:00:00');
    const trabaja=profActual.dias.includes(d.getDay());
    el.innerHTML=`<div class="t-empty">${trabaja?'Sin turnos agendados para este dĂ­a':'No trabajĂˇs este dĂ­a'}</div>`;
    return;
  }
  el.innerHTML=ts.map(t=>`
    <div class="t-item">
      <div class="t-time" style="color:${profActual.color}">${t.hora}</div>
      <div class="t-body">
        <div class="t-pac">${t.paciente}</div>
        <div class="t-srv">${t.servicio} 
· đź“± ${t.tel||'â€”'}</div>
        ${t.notas?`<div class="t-nota">âš ď¸Ź ${t.notas}</div>`:''}
      </div>
      <span class="pill ${t.estado}">${t.estado.charAt(0).toUpperCase()+t.estado.slice(1)}</span>
      ${t.origen==='online'?'<span class="pill online">Online</span>':''}
    </div>
  `).join('');
}

function renderSlots(){
  const slots=generarSlots(profActual.id, diaActivo);
  const el=document.getElementById('slotsGrid');
  if(!slots.length){el.innerHTML='<div style="padding:.75rem;font-size:12.5px;color:var(--gris-med);text-align:center;grid-column:span 3">No disponible</div>';return;}
  el.innerHTML=slots.map(s=>`<div class="slot ${s.disponible?'libre':'ocupado'}">${s.hora}</div>`).join('');
}

function renderProxSemana(){
  const lunes=getLunes(1);
  const ts=[];
  for(let i=0;i<6;i++){
    const d=new Date(lunes); d.setDate(lunes.getDate()+i);
    const fStr=fechaStr(d);
    TURNOS.filter(t=>t.profesionalId===profActual.id&&t.fecha===fStr&&t.estado!=='cancelado').forEach(t=>ts.push({...t,_d:d}));
  }
  const el=document.getElementById('proxSemana');
  if(!ts.length){el.innerHTML='<div style="padding:1rem;font-size:12.5px;color:var(--gris-med);text-align:center">Sin turnos la prĂłxima semana</div>';return;}
  el.innerHTML=ts.slice(0,8).map(t=>`
    <div class="prox-row">
      <span class="prox-fecha">${DIAS_NOMBRES[t._d.getDay()]} ${t._d.getDate()}</span>
      <div style="flex:1">
        <div class="prox-pac">${t.paciente.split(' ')[0]} ${t.paciente.split(' ')[1]||''}</div>
        <div class="prox-info">${t.servicio}</div>
      </div>
      <span class="prox-hora" style="color:${profActual.color}">${t.hora}</span>
    </div>
  `).join('');
}

function cambiarSemana(d){ offsetSemana+=d; renderDayTabs(); }

// INIT
initPills();
seleccionarDoctor('p1');
</script>
</body>
</html>
